<!doctype html>
<html lang="en">
<head>
    <style>
        body{background-color: white;
        color: black;
        font-size: 20px;
        font-family: "monospace";
        text-align: center;
        padding: 15px;
        margin: 15px;
        font-family: sans-serif}
        li,a{text-align: center;
            color: black;
            padding: 20px;
            font-size: 30px;
            float: top;
            list-style: none;
            text-decoration-line: none;}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Sign Up</title>
</head>
<body>
<li><a href="Homepage.html">Spotify</a></li>
<h1>Sign up here</h1>
<form action="">
<label for="Whats your email?">Whats your email?</label><br>
<input type="text"id="Whats your email?" placeholder="Enter your email."><br>
<label for="Confrirm your email">Confirm your email</label><br>
<input type="text"id="Confrirm your email" placeholder="Enter your email again."><br>
<label for="Create a password">Create a password</label><br>
<input type="password"id="Create a password" placeholder="Create a password."><br>
<label for="What should we call you?">What should we call you?</label><br>
<input type="text"id="What should we call you?" placeholder="Enter a profile name."><br>
<label for="Date of Birth">Date of Birth</label><br>
<input type="date"id="Date of Birth" placeholder="Enter Date Of Birth"><br>
<h3>What do you identify as?</h3><br>
<label for="Male">Male</label><br>
<input type="radio"id="Male" name="What do you identify as?"><br>
<label for="Female">Female</label><br>
<input type="radio"id="Female" name="What do you identify as?"><br>
<label for="Non-binary">Non-binary</label><br>
<input type="radio"id="Non-binary" name="What do you identify as?"><br>
<input type="submit" value="Sign up" style="font-size: 30px"><br>
</form>

</body>
</html>
